<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>抖音血条插件</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:transparent;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;user-select:none;}

  .blood-bar-wrapper{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
  .blood-bar-container{position:relative;width:100%;height:100%;display:flex;align-items:center;}

  /* 外框 */
  .bar-outer{position:absolute;inset:0;z-index:3;pointer-events:none;background-size:100% 100%;background-repeat:no-repeat;background-position:center;}

  /* 内框背景 */
  .bar-inner-bg{
    position:absolute;z-index:1;background:rgba(30,30,30,0.85);border-radius:4px;overflow:hidden;
    transition:left .15s,right .15s,top .15s,height .15s;
  }

  /* 血量填充 */
  .bar-fill{position:absolute;top:0;left:0;height:100%;z-index:2;transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:4px;}
  .bar-fill-gradient{
    width:100%;height:100%;
    background:linear-gradient(180deg,#ff4444 0%,#e83030 25%,#cc2222 50%,#991111 75%,#770000 100%);
    border-radius:4px;
    box-shadow:inset 0 2px 4px rgba(255,255,255,.2),inset 0 -2px 4px rgba(0,0,0,.3);
    position:relative;overflow:hidden;
  }
  .bar-fill-gradient::after{
    content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);
    animation:shimmer 2s infinite;
  }
  @keyframes shimmer{0%{left:-60%;}100%{left:120%;}}

  /* 低血量警告 */
  .bar-fill.low-hp .bar-fill-gradient{
    animation:lowHpPulse .5s infinite alternate;
    background:linear-gradient(180deg,#ff2222,#990000,#550000);
  }
  @keyframes lowHpPulse{0%{opacity:.7;}100%{opacity:1;}}

  /* HP文字 */
  .hp-text{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:4;color:#fff;font-size:18px;font-weight:bold;
    text-shadow:0 0 8px rgba(0,0,0,.8),0 0 16px rgba(0,0,0,.6),1px 1px 2px rgba(0,0,0,.9);
    pointer-events:none;white-space:nowrap;letter-spacing:1px;
  }

  /* 礼物提示 */
  .gift-toast{
    position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    z-index:10;color:#fff;font-size:14px;font-weight:bold;
    text-shadow:0 0 10px rgba(255,255,0,.8),1px 1px 3px rgba(0,0,0,.9);
    opacity:0;pointer-events:none;white-space:nowrap;transition:all .3s ease;
  }
  .gift-toast.show{opacity:1;top:-40px;}
  .gift-toast.heal{color:#4eff4e;text-shadow:0 0 10px rgba(78,255,78,.8);}
  .gift-toast.damage{color:#ff4e4e;text-shadow:0 0 10px rgba(255,78,78,.8);}

  /* 拖拽缩放手柄 */
  .resize-handle{
    position:absolute;right:0;bottom:0;width:18px;height:18px;z-index:20;
    cursor:se-resize;
    background:
      linear-gradient(135deg, transparent 50%, rgba(255,255,255,.5) 50%, rgba(255,255,255,.5) 60%, transparent 60%, transparent 70%, rgba(255,255,255,.5) 70%, rgba(255,255,255,.5) 80%, transparent 80%);
  }
  .resize-handle:hover{background-color:rgba(255,255,255,.15);}

  /* ====== 右键菜单 ====== */
  .ctx-menu{
    position:fixed;z-index:200;min-width:170px;background:#252535;
    border:1px solid #444;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);
    padding:4px;display:none;
  }
  .ctx-menu.show{display:block;}
  .ctx-item{padding:8px 16px;font-size:13px;color:#e0e0e0;border-radius:5px;cursor:pointer;}
  .ctx-item:hover{background:#ff6b6b;color:#fff;}
  .ctx-item.danger:hover{background:#c0392b;}
  .ctx-sep{height:1px;background:#3a3a4a;margin:4px 8px;}

  /* ====== 配置面板 ====== */
  .config-overlay{
    position:fixed;top:0;left:0;width:100vw;height:100vh;    background:rgba(0,0,0,.5);
    z-index:100;display:none;
  }
  .config-overlay.show{display:flex;align-items:center;justify-content:center;}

  .config-panel{
    background:#1e1e2e;border:2px solid #444;border-radius:12px;width:620px;max-height:85vh;
    overflow-y:auto;color:#e0e0e0;box-shadow:0 20px 60px rgba(0,0,0,.6);padding:24px;
  }
  .config-panel h2{font-size:20px;margin-bottom:16px;color:#ff6b6b;text-align:center;border-bottom:1px solid #333;padding-bottom:12px;}
  .config-section{margin-bottom:16px;padding:12px;background:#252535;border-radius:8px;}
  .config-section h3{font-size:15px;margin-bottom:10px;color:#aaa;}
  .config-row{display:flex;align-items:center;margin-bottom:8px;gap:10px;}
  .config-row label{min-width:80px;font-size:13px;color:#bbb;text-align:right;}
  .config-row input[type="text"],.config-row input[type="number"]{
    flex:1;padding:6px 10px;border:1px solid #444;border-radius:4px;background:#1a1a2a;color:#e0e0e0;font-size:13px;outline:none;
  }
  .config-row input:focus{border-color:#ff6b6b;}

  .gift-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .gift-slot{background:#1a1a2a;border:1px solid #333;border-radius:6px;padding:8px;display:flex;align-items:center;gap:6px;font-size:12px;}
  .gift-slot.heal-slot{border-left:3px solid #4eff4e;}
  .gift-slot.damage-slot{border-left:3px solid #ff4e4e;}
  .gift-slot .slot-label{min-width:28px;font-size:11px;color:#888;}
  .gift-slot input{width:80px;padding:4px 6px;border:1px solid #333;border-radius:3px;background:#111122;color:#e0e0e0;font-size:12px;outline:none;}
  .gift-slot input:focus{border-color:#ff6b6b;}
  .gift-slot input.gift-id-input{width:100px;}
  .gift-slot input.gift-name-input{width:70px;}
  .gift-slot input.hp-input{width:55px;}

  .image-preview{width:100%;height:40px;border:1px dashed #444;border-radius:4px;background:#1a1a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#666;font-size:12px;background-size:contain;background-repeat:no-repeat;background-position:center;margin-top:6px;overflow:hidden;}
  .image-preview:hover{border-color:#ff6b6b;color:#ff6b6b;}
  .image-preview.has-image{border-style:solid;border-color:#4eff4e;color:transparent;}

  .btn-row{display:flex;gap:10px;margin-top:16px;justify-content:center;}
  .btn{padding:8px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:all .2s;}
  .btn-primary{background:#ff6b6b;color:#fff;}.btn-primary:hover{background:#ff5252;}
  .btn-secondary{background:#333;color:#ccc;}.btn-secondary:hover{background:#444;}

  .status-text{font-size:12px;color:#666;text-align:center;margin-top:8px;}
  .status-text.connected{color:#4eff4e;}.status-text.disconnected{color:#ff4e4e;}

  .config-panel::-webkit-scrollbar{width:6px;}.config-panel::-webkit-scrollbar-track{background:transparent;}.config-panel::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
  .help-text{font-size:11px;color:#666;margin-top:4px;}
  .hint{font-size:11px;color:#888;margin-top:4px;}
</style>
</head>
<body>

<div class="blood-bar-wrapper">
  <div class="blood-bar-container" id="bloodBarContainer">
    <div class="bar-inner-bg" id="barInnerBg">
      <div class="bar-fill" id="barFill" style="width:100%"><div class="bar-fill-gradient"></div></div>
    </div>
    <div class="bar-outer" id="barOuter"></div>
    <div class="hp-text" id="hpText">100 / 100</div>
    <div class="gift-toast" id="giftToast"></div>
    <div class="resize-handle" id="resizeHandle" title="拖拽调整血条大小"></div>
  </div>
</div>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" data-action="config">⚙️ 配置面板</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="connect">🔗 连接直播间</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="reset">🔄 重置血条</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" data-action="quit">❌ 退出程序</div>
</div>

<!-- 配置面板 -->
<div class="config-overlay" id="configOverlay">
  <div class="config-panel" id="configPanel">
    <h2>⚙️ 血条插件配置</h2>

    <div class="config-section" id="sectionConnection">
      <h3>🔗 连接设置</h3>
      <div class="config-row"><label>Cookie</label><input type="text" id="cookieInput" placeholder="粘贴抖音直播Cookie..."></div>
      <div class="config-row"><label>房间号</label><input type="text" id="roomIdInput" placeholder="抖音直播间ID（URL中数字部分）"></div>
      <div class="config-row"><label>WS端口</label><input type="number" id="wsPortInput" value="1088" min="1" max="65535"></div>
      <div class="status-text disconnected" id="connectionStatus">未连接</div>
      <div class="help-text">程序已内置douyinLive服务并自动启动。房间号即抖音直播URL中的数字ID。</div>
    </div>

    <div class="config-section"><h3>❤️ 血量设置</h3>
      <div class="config-row"><label>血量上限</label><input type="number" id="maxHpInput" value="100" min="1" max="99999"></div>
      <div class="config-row"><label>当前血量</label><input type="number" id="currentHpInput" value="100" min="0" max="99999"></div>
      <button class="btn btn-secondary" onclick="resetHp()" style="margin-top:8px;">🔄 重置血量至上限</button>
    </div>

    <!-- 尺寸设置 -->
    <div class="config-section"><h3>📐 尺寸设置</h3>
      <div class="hint">提示：也可直接用鼠标拖拽血条右下角来调整长宽，内条会自动跟随。</div>
      <div class="config-row" style="margin-top:8px;"><label>血条长度</label><input type="number" id="barWidthInput" value="400" min="120" max="3000"><span style="color:#888;font-size:12px;">px</span></div>
      <div class="config-row"><label>血条高度</label><input type="number" id="barHeightInput" value="60" min="30" max="1000"><span style="color:#888;font-size:12px;">px</span></div>
      <div class="config-row"><label>外框宽度</label><input type="number" id="outerFrameWidthInput" value="3" min="0" max="50"><span style="color:#888;font-size:12px;">px（0=无边框）</span></div>
      <div class="config-row"><label>内条占比</label><input type="number" id="innerBarRatioInput" value="70" min="20" max="95"><span style="color:#888;font-size:12px;">%（占窗口高度的百分比）</span></div>
    </div>

    <div class="config-section"><h3>🎁 礼物配置（8个槽位）</h3>
      <div class="help-text" style="margin-bottom:8px;">收到礼物后从 douyinLive 控制台查看礼物ID填入。正数加血，负数减血。</div>
      <div class="gift-slots" id="giftSlots"></div>
    </div>

    <div class="config-section"><h3>🎨 血条外观</h3>
      <div class="config-row"><label>内框图片</label></div>
      <div class="image-preview" id="innerImagePreview" onclick="selectImage('inner')">点击选择内框背景图片</div>
      <button class="btn btn-secondary" onclick="clearImage('inner')" style="margin-top:4px;font-size:11px;padding:4px 12px;">清除自定义内框</button>
      <div class="config-row" style="margin-top:12px;"><label>外框图片</label></div>
      <div class="image-preview" id="outerImagePreview" onclick="selectImage('outer')">点击选择外框覆盖图片</div>
      <button class="btn btn-secondary" onclick="clearImage('outer')" style="margin-top:4px;font-size:11px;padding:4px 12px;">清除自定义外框</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAllConfig()">💾 保存配置</button>
      <button class="btn btn-secondary" onclick="closeConfig()">✖ 关闭</button>
    </div>
    <div class="help-text" style="margin-top:12px;">💡 右键血条打开此配置面板 | 拖拽右下角调整大小</div>
  </div>
</div>

<script>
const {ipcRenderer}=require('electron');
let currentConfig=null, toastTimer=null;

async function init(){
  currentConfig=await ipcRenderer.invoke('get-config');
  applyConfig();renderGiftSlots();bindInputs();bindResizeHandle();bindContextMenu();bindWindowDrag();
}

// 计算内条尺寸（基于窗口高度比例）
function calcInnerSize(winH){
  const ratio=(currentConfig.innerBarRatio||70)/100;
  return Math.max(10, winH * ratio);
}

// 应用配置
function applyConfig(){
  updateHpDisplay(currentConfig.currentHp,currentConfig.maxHp);
  document.getElementById('maxHpInput').value=currentConfig.maxHp;
  document.getElementById('currentHpInput').value=currentConfig.currentHp;
  document.getElementById('cookieInput').value=currentConfig.cookie||'';
  document.getElementById('roomIdInput').value=currentConfig.roomId||'';
  document.getElementById('wsPortInput').value=currentConfig.wsPort||1088;
  document.getElementById('barWidthInput').value=currentConfig.barWidth||400;
  document.getElementById('barHeightInput').value=currentConfig.barHeight||60;
  document.getElementById('outerFrameWidthInput').value=currentConfig.outerFrameWidth||3;
  document.getElementById('innerBarRatioInput').value=currentConfig.innerBarRatio||70;

  updateImagePreview('inner',currentConfig.barInnerImage);
  updateImagePreview('outer',currentConfig.barOuterImage);
  applyFrameStyles();
}

// 应用外框/内框样式
function applyFrameStyles(){
  const outer=document.getElementById('barOuter');
  const inner=document.getElementById('barInnerBg');
  const ow=parseInt(currentConfig.outerFrameWidth)||0;
  // 内条高度 = 窗口高度 * 占比（默认70%）
  const winH=currentConfig.windowHeight||(currentConfig.barHeight+20)||80;
  const ih=calcInnerSize(winH);
  const gap=ow+5;

  if(currentConfig.barOuterImage){
    outer.style.cssText='position:absolute;inset:0;z-index:3;pointer-events:none;background-size:100% 100%;background-repeat:no-repeat;background-position:center;background-image:url('+currentConfig.barOuterImage+');';
  }else{
    outer.style.cssText='position:absolute;inset:0;z-index:3;pointer-events:none;border:'+ow+'px solid #555;border-radius:'+Math.max(2,ow-1)+'px;box-shadow:0 0 8px rgba(0,0,0,.5),inset 0 0 4px rgba(0,0,0,.3);background:transparent;';
  }

  inner.style.left=gap+'px';inner.style.right=gap+'px';
  inner.style.top='50%';inner.style.transform='translateY(-50%)';
  inner.style.height=ih+'px';

  if(currentConfig.barInnerImage){
    inner.style.backgroundImage='url('+currentConfig.barInnerImage+')';
    inner.style.backgroundSize='100% 100%';inner.style.backgroundRepeat='no-repeat';inner.style.backgroundPosition='center';inner.style.background='';
    document.getElementById('barFill').style.opacity='.75';
  }else{
    inner.style.backgroundImage='';inner.style.background='rgba(30,30,30,0.85)';
    document.getElementById('barFill').style.opacity='1';
  }
}

function updateHpDisplay(hp,maxHp){
  const pct=Math.max(0,Math.min(100,(hp/maxHp)*100));
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('hpText').textContent=Math.round(hp)+' / '+maxHp;
  if(pct<=25)document.getElementById('barFill').classList.add('low-hp');
  else document.getElementById('barFill').classList.remove('low-hp');
}

function updateImagePreview(type,dataUrl){
  const preview=document.getElementById(type==='inner'?'innerImagePreview':'outerImagePreview');
  if(dataUrl){preview.style.backgroundImage='url('+dataUrl+')';preview.classList.add('has-image');preview.textContent='';}
  else{preview.style.backgroundImage='';preview.classList.remove('has-image');preview.textContent=type==='inner'?'点击选择内框背景图片':'点击选择外框覆盖图片';}
}

function renderGiftSlots(){
  const container=document.getElementById('giftSlots');container.innerHTML='';
  const labels=['加血1','加血2','加血3','加血4','减血1','减血2','减血3','减血4'];
  currentConfig.gifts.forEach((gift,idx)=>{
    const isHeal=gift.type==='heal';
    const hpValue=isHeal?Math.abs(gift.hpChange):-Math.abs(gift.hpChange);
    const div=document.createElement('div');
    div.className='gift-slot '+(isHeal?'heal-slot':'damage-slot');
    div.innerHTML='<span class="slot-label">'+labels[idx]+'</span>'
      +'<input type="text" class="gift-id-input" placeholder="礼物ID" value="'+(gift.id||'')+'" data-idx="'+idx+'" data-field="id">'
      +'<input type="text" class="gift-name-input" placeholder="名称" value="'+(gift.name||'')+'" data-idx="'+idx+'" data-field="name">'
      +'<input type="number" class="hp-input" placeholder="血量" value="'+(hpValue||0)+'" data-idx="'+idx+'" data-field="hpChange">';
    container.appendChild(div);
  });
  container.querySelectorAll('input').forEach(input=>{
    input.addEventListener('change',()=>{
      const idx=parseInt(input.dataset.idx),field=input.dataset.field;
      if(field==='hpChange'){
        const v=parseInt(input.value)||0;
        currentConfig.gifts[idx].hpChange=currentConfig.gifts[idx].type==='heal'?Math.abs(v):-Math.abs(v);
      }else currentConfig.gifts[idx][field]=input.value;
    });
  });
}

async function selectImage(type){
  const dUrl=await ipcRenderer.invoke('select-image');
  if(dUrl){if(type==='inner')currentConfig.barInnerImage=dUrl;else currentConfig.barOuterImage=dUrl;updateImagePreview(type,dUrl);}
}
function clearImage(type){if(type==='inner')currentConfig.barInnerImage='';else currentConfig.barOuterImage='';updateImagePreview(type,'');applyFrameStyles();}
async function resetHp(){currentConfig=await ipcRenderer.invoke('reset-hp');updateHpDisplay(currentConfig.currentHp,currentConfig.maxHp);document.getElementById('currentHpInput').value=currentConfig.currentHp;}

async function saveAllConfig(){
  currentConfig.cookie=document.getElementById('cookieInput').value;
  currentConfig.roomId=document.getElementById('roomIdInput').value;
  currentConfig.wsPort=parseInt(document.getElementById('wsPortInput').value)||1088;
  currentConfig.maxHp=parseInt(document.getElementById('maxHpInput').value)||100;
  currentConfig.currentHp=parseInt(document.getElementById('currentHpInput').value)||100;
  currentConfig.barWidth=parseInt(document.getElementById('barWidthInput').value)||400;
  currentConfig.barHeight=parseInt(document.getElementById('barHeightInput').value)||60;
  currentConfig.outerFrameWidth=parseInt(document.getElementById('outerFrameWidthInput').value)||3;
  currentConfig.innerBarRatio=parseInt(document.getElementById('innerBarRatioInput').value)||70;
  currentConfig.currentHp=Math.min(currentConfig.currentHp,currentConfig.maxHp);
  currentConfig.currentHp=Math.max(0,currentConfig.currentHp);

  currentConfig=await ipcRenderer.invoke('save-config',currentConfig);
  applyConfig();renderGiftSlots();
  ipcRenderer.send('resize-window',currentConfig.barWidth,currentConfig.barHeight);
  showToast('配置已保存!','heal');setTimeout(()=>closeConfig(),800);
}

function openConfig(section){
  document.getElementById('configOverlay').classList.add('show');
  if(section==='connection')document.getElementById('sectionConnection').scrollIntoView({behavior:'smooth'});
}
function closeConfig(){document.getElementById('configOverlay').classList.remove('show');}
document.getElementById('configOverlay').addEventListener('click',function(e){if(e.target===this)closeConfig();});

function showToast(msg,type){
  const toast=document.getElementById('giftToast');toast.textContent=msg;toast.className='gift-toast '+type+' show';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
}

// 绑定尺寸输入
function bindInputs(){
  ['barWidthInput','barHeightInput'].forEach(id=>{
    document.getElementById(id).addEventListener('change',()=>{
      currentConfig.barWidth=parseInt(document.getElementById('barWidthInput').value)||400;
      currentConfig.barHeight=parseInt(document.getElementById('barHeightInput').value)||60;
      ipcRenderer.send('resize-window',currentConfig.barWidth,currentConfig.barHeight);
      ipcRenderer.invoke('persist-config',{barWidth:currentConfig.barWidth,barHeight:currentConfig.barHeight});
    });
  });
  document.getElementById('outerFrameWidthInput').addEventListener('change',()=>{
    currentConfig.outerFrameWidth=parseInt(document.getElementById('outerFrameWidthInput').value)||0;
    applyFrameStyles();ipcRenderer.invoke('persist-config',{outerFrameWidth:currentConfig.outerFrameWidth});
  });
  document.getElementById('innerBarRatioInput').addEventListener('change',()=>{
    currentConfig.innerBarRatio=parseInt(document.getElementById('innerBarRatioInput').value)||70;
    applyFrameStyles();ipcRenderer.invoke('persist-config',{innerBarRatio:currentConfig.innerBarRatio});
  });
}

// 拖拽缩放手柄
function bindResizeHandle(){
  const handle=document.getElementById('resizeHandle');
  let dragging=false,sx=0,sy=0,sw=0,sh=0;
  handle.addEventListener('mousedown',(e)=>{
    e.preventDefault();e.stopPropagation();dragging=true;
    sx=e.clientX;sy=e.clientY;sw=currentConfig.barWidth||400;sh=currentConfig.barHeight||60;
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
  function onMove(e){
    if(!dragging)return;
    currentConfig.barWidth=Math.max(120,sw+(e.clientX-sx));
    currentConfig.barHeight=Math.max(30,sh+(e.clientY-sy));
    ipcRenderer.send('resize-window',currentConfig.barWidth,currentConfig.barHeight);
    document.getElementById('barWidthInput').value=currentConfig.barWidth;
    document.getElementById('barHeightInput').value=currentConfig.barHeight;
    applyFrameStyles(); // ★ 拖拽时实时更新内条尺寸！
  }
  function onUp(){
    if(!dragging)return;dragging=false;
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    ipcRenderer.invoke('persist-config',{barWidth:currentConfig.barWidth,barHeight:currentConfig.barHeight});
  }
}

// ★ 右键菜单 — 接收主进程发来的坐标事件
function bindContextMenu(){
  const ctxMenu=document.getElementById('ctxMenu');

  // 显示菜单的辅助函数
  function showCtxMenu(x,y){
    ctxMenu.classList.remove('show');
    requestAnimationFrame(()=>{
      ctxMenu.style.left=x+'px';
      ctxMenu.style.top=y+'px';
      ctxMenu.classList.add('show');
    });
  }

  // 监听主进程发来的 open-context-menu 事件
  ipcRenderer.on('open-context-menu',(event,x,y)=>{ showCtxMenu(x,y); });

  // DOM contextmenu 兜底（非Windows或主进程没拦截时）
  document.getElementById('bloodBarContainer').addEventListener('contextmenu',(e)=>{
    e.preventDefault();
    showCtxMenu(e.clientX,e.clientY);
  });

  // 点击其他地方关闭菜单
  document.addEventListener('click',()=>ctxMenu.classList.remove('show'));
  ctxMenu.addEventListener('click',(e)=>e.stopPropagation());

  // 菜单项动作
  ctxMenu.querySelectorAll('.ctx-item').forEach(item=>{
    item.addEventListener('click',()=>{
      ctxMenu.classList.remove('show');
      switch(item.dataset.action){
        case 'config':openConfig();break;
        case 'connect':openConfig('connection');break;
        case 'reset':resetHp();break;
        case 'quit':ipcRenderer.send('app-quit');break;
      }
    });
  });
}

// ★ 手动拖拽窗口（替代 -webkit-app-region: drag，避免拖拽区域吞掉右键事件）
function bindWindowDrag(){
  const container=document.getElementById('bloodBarContainer');
  let dragging=false,lastX=0,lastY=0;
  container.addEventListener('mousedown',(e)=>{
    if(e.button!==0)return;                 // 只响应左键
    if(e.target.closest('.resize-handle'))return; // 手柄不算拖拽
    dragging=true;lastX=e.clientX;lastY=e.clientY;
    document.body.style.cursor='move';
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  function onMove(e){
    if(!dragging)return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    lastX=e.clientX;lastY=e.clientY;
    ipcRenderer.send('drag-window',dx,dy);
  }
  function onUp(){
    dragging=false;document.body.style.cursor='';
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  }
}

// ★ 窗口缩放时更新内条（从main.js的resize事件触发）
ipcMain=undefined; // 避免冲突
ipcRenderer.on('window-resized',(event,w,h)=>{
  currentConfig.windowWidth=w;currentConfig.windowHeight=h;
  applyFrameStyles(); // 根据新窗口高重算内条
});

// IPC事件监听
ipcRenderer.on('open-config',(event,section)=>openConfig(section));
ipcRenderer.on('update-hp',(event,hp,maxHp)=>{currentConfig.currentHp=hp;currentConfig.maxHp=maxHp;updateHpDisplay(hp,maxHp);});
ipcRenderer.on('gift-received',(event,data)=>{
  currentConfig.currentHp=data.newHp;updateHpDisplay(data.newHp,data.maxHp);
  const sign=data.hpChange>=0?'+':'';
  const type=data.type==='heal'?'heal':'damage';
  const repeatText=data.repeatCount>1?' x'+data.repeatCount:'';
  showToast(data.giftName+repeatText+'  '+sign+data.hpChange+' HP',type);
});
ipcRenderer.on('connection-status',(event,connected)=>{
  const st=document.getElementById('connectionStatus');
  if(connected){st.textContent='已连接 ✓';st.className='status-text connected';}
  else{st.textContent='未连接';st.className='status-text disconnected';}
});

init();
</script>
